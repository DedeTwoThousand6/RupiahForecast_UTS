name: Sync to Hugging Face Spaces
on:
  push:
    branches: [main] # Ganti 'master' jika nama branch utama Anda masih master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
          
      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://RupiahForecast_UTS:$HF_TOKEN@huggingface.co/spaces/USERNAME_HF_ANDA/NAMA_SPACE_ANDA main